server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # HTML — never cache. Browser checks for fresh copy every time.
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
    }

    # Static assets — cache 1h for performance
    location ~* \.(css|js|jpg|jpeg|png|gif|pdf|svg|ico|webp)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
